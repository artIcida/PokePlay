<!doctype html>
<html lang="gl">
<head>
<link rel="icon" type="image/x-icon" href="pokeplay.ico?v=2">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PokéPlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background: #0b0b0b;
    color: #efefef;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    box-sizing: border-box;
    min-height: 100vh;
  }
  *,*::before,*::after{box-sizing:inherit}

  h2{margin:10px 18px;}

  main{
    display:flex;
    flex-wrap:nowrap;
    align-items:flex-start;
    gap:20px;
    padding:0 18px 18px 18px;
  }

  #leftCol{
    flex:1 1 auto;
    min-width:0;
    max-width:900px;
    display:flex;
    flex-direction:column;
  }

  #controls{
    flex:0 0 auto;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }

  #player{
    flex:1 1 auto;
    background:#0b0b0b;
    padding:8px;
    border-radius:8px;
    box-sizing:border-box;
    position: relative;
  }

  video{
    width:100%;
    aspect-ratio:16/9;
    border-radius:6px;
    background:#0b0b0b;
    display:block;
  }

  .meta{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#efefef;
    font-size:0.9rem;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  #rightCol{
    flex:0 0 260px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-top:0;
  }

  #seasonImg{
    width:100%;
    height:auto;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,0);
    opacity:0;
    transition:opacity .4s ease;
    object-fit:contain;
    margin-top:8px;
  }

  #seasonImg.visible{opacity:1;}

  /* Botón Chromecast (Cores oficiais restablecidas) */
  google-cast-launcher {
    --disconnected-color: #efefef; /* Branco para o modo escuro */
    --connected-color: #4285f4;    /* Azul oficial de Google */
    --hover-color: #8ab4f8;        /* Azul máis claro ao pasar por riba */
    height: 30px;
    width: 30px;
    cursor: pointer;
  }

  #navButtons {
    display:flex;
    gap:10px;
    margin-top:8px;
    justify-content:center;
  }

  #navButtons button{
    padding:6px 12px;
    font-size:1.4rem;
    border:none;
    border-radius:25px;
    background:#efefef;
    color:#0b0b0b;
    cursor:pointer;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  @media (max-width: 800px){
    main{
      flex-direction:column;
      align-items:center;
    }
    #rightCol{
      order:-1;
      flex:0 0 auto;
      width:60%;
    }
  }
</style>
</head>
<body>
<h2>▶ PokéPlay</h2>

<main>
  <div id="leftCol">
    <div class="row" id="controls">
      <label>
        Tempada:
        <select id="seasonSelect"></select>
      </label>
      <label>
        Episodio:
        <select id="episodeSelect"></select>
      </label>
      <button id="playBtn">Reproducir</button>
      <google-cast-launcher id="castBtn"></google-cast-launcher>
    </div>

    <div id="player">
      <div id="castOverlay" style="display: none; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px; background: #141414; color: #efefef; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; z-index: 10; font-size: 1.2rem;">
        <span style="font-size: 3.5rem; margin-bottom: 5px;">📺</span>
        <span style="font-size: 1.2rem; font-weight: bold; margin-bottom: 25px;">Reproducindo na túa televisión</span>
        
        <div style="display: flex; align-items: center; gap: 15px; width: 85%; max-width: 500px; background: #222; padding: 10px 18px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
          <button id="castPlayPauseBtn" style="background: none; border: none; color: #efefef; font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1;">⏸</button>
          <input type="range" id="castProgressBar" min="0" max="100" value="0" style="flex: 1; height: 6px; cursor: pointer; accent-color: #4285f4;">
          <span id="castTimeLabel" style="font-size: 0.85rem; font-family: monospace; color: #aaa; min-width: 90px; text-align: right;">00:00 / 00:00</span>
        </div>
      </div>

      <video id="video" controls preload="metadata"></video>
      <div class="meta">
        <div id="nowLabel"><strong>Sen reproducir</strong></div>
        <div><small id="status">estado: listo</small></div>
      </div>
    </div>
  </div>

  <aside id="rightCol">
    <img id="seasonImg" src="" alt="Logo da tempada" />
    <div id="navButtons">
      <button id="prevBtn">⇜</button>
      <button id="nextBtn">⇝</button>
    </div>
  </aside>
</main>

<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script>
const baseBase = "https://pkproject.net/descargas/epis/serie-ash";
const episodesPerSeason = [83,35,41,52,65,40,52,54,47,52,52,53,34,48,49,45,49,43,48,43,49,54,48,42,58];

function getSeasonImageUrl(season){
  return `https://pkproject.net/anime/logo/1/season${season}_logo1.png`;
}

function pad2(n){return n<10?"0"+n:""+n;}
function formatTimeHelper(secs) {
  if (isNaN(secs)) return "00:00";
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return pad2(m) + ":" + pad2(s);
}

const video=document.getElementById('video');
const seasonSelect=document.getElementById('seasonSelect');
const episodeSelect=document.getElementById('episodeSelect');
const playBtn=document.getElementById('playBtn');
const nowLabel=document.getElementById('nowLabel');
const status=document.getElementById('status');
const img=document.getElementById('seasonImg');
const nextBtn=document.getElementById('nextBtn');
const prevBtn=document.getElementById('prevBtn');
const castOverlay=document.getElementById('castOverlay');
const castPlayPauseBtn = document.getElementById('castPlayPauseBtn');
const castProgressBar = document.getElementById('castProgressBar');

const numSeasons=episodesPerSeason.length;

for(let s=1;s<=numSeasons;s++){
  const opt=document.createElement('option');
  opt.value=s;
  opt.textContent=`${s}`;
  seasonSelect.appendChild(opt);
}

function fillEpisodesForSeason(season){
  episodeSelect.innerHTML='';
  const count=episodesPerSeason[season-1];
  for(let e=1;e<=count;e++){
    const o=document.createElement('option');
    o.value=e;
    o.textContent=`${e}`;
    episodeSelect.appendChild(o);
  }
}

seasonSelect.addEventListener('change',()=>{
  fillEpisodesForSeason(parseInt(seasonSelect.value));
  updateSeasonImage(parseInt(seasonSelect.value));
});

function getEpisodeUrl(season,episode){
  const ss=pad2(season);
  const ee=pad2(episode);
  return `${baseBase}/t${ss}/t${ss}_e${ee}.mp4`;
}

let currentSeason=1;
let currentEpisode=1;

// RECUPERAR PROGRESO (localStorage)
const savedSeason = localStorage.getItem('pokeSeason');
const savedEpisode = localStorage.getItem('pokeEpisode');
const savedTime = localStorage.getItem('pokeTime');

if (savedSeason && savedEpisode) {
  currentSeason = parseInt(savedSeason);
  currentEpisode = parseInt(savedEpisode);
  
  seasonSelect.value = currentSeason;
  fillEpisodesForSeason(currentSeason);
  episodeSelect.value = currentEpisode;
  updateSeasonImage(currentSeason);
  
  nowLabel.innerHTML = `<strong>Continuar: T${currentSeason} · E${currentEpisode}</strong>`;
  status.textContent = `Progreso atopado. Listo para retomar.`;
  playBtn.dataset.resumeTime = savedTime || 0;
} else {
  seasonSelect.value=1;
  fillEpisodesForSeason(1);
  updateSeasonImage(1);
}

function updateSeasonImage(season){
  const url=getSeasonImageUrl(season);
  img.classList.remove('visible');
  const tempImg=new Image();
  tempImg.onload=()=>{
    img.src=url;
    img.classList.add('visible');
  };
  tempImg.src=url;
}

function loadAndPlayCurrent(resumeTime = 0){
  const url=getEpisodeUrl(currentSeason,currentEpisode);
  nowLabel.innerHTML=`<strong>T${currentSeason} · E${currentEpisode}</strong>`;
  status.textContent=`Cargando T${currentSeason} E${currentEpisode}...`;
  updateSeasonImage(currentSeason);
  video.src=url;
  
  if (resumeTime > 0) {
    video.addEventListener('loadedmetadata', function onMetaLoad() {
      video.currentTime = parseFloat(resumeTime);
      video.removeEventListener('loadedmetadata', onMetaLoad);
    });
  }

  // Se o Chromecast está activo, mandamos o vídeo directamente á TV de xeito limpo
  if (castPlayer && castPlayer.isConnected) {
    video.pause();
    video.removeAttribute('controls');
    castOverlay.style.display = 'flex';
    enviarVideoAChromecastConTempo(url, resumeTime > 0 ? resumeTime : 0);
    return;
  }

  // Se non hai Chromecast, reprodúcese no navegador normalmente
  video.setAttribute('controls', 'true');
  video.play().then(()=>{status.textContent=`Reproducindo`;}).catch(()=>{status.textContent=`Listo`;});
}

function advanceToNext(){
  let s=currentSeason;
  let e=currentEpisode+1;
  if(e>episodesPerSeason[s-1]){s++;e=1;}
  if(s>numSeasons){return false;} 
  currentSeason=s;
  currentEpisode=e;
  seasonSelect.value=s;
  fillEpisodesForSeason(s);
  episodeSelect.value=e;
  loadAndPlayCurrent(0);
  return true;
}

function goToPrev(){
  let s=currentSeason;
  let e=currentEpisode-1;
  if(e<1){s--; if(s<1)return false; e=episodesPerSeason[s-1];}
  currentSeason=s;
  currentEpisode=e;
  seasonSelect.value=s;
  fillEpisodesForSeason(s);
  episodeSelect.value=e;
  loadAndPlayCurrent(0);
}

video.addEventListener('ended',()=>{setTimeout(()=>{advanceToNext();},400);});
video.addEventListener('error',()=>{status.textContent=`Erro...`;setTimeout(()=>{advanceToNext();},800);});

// Gardar progreso local (só se non está o Chromecast enviando)
video.addEventListener('timeupdate', () => {
  if (castPlayer && castPlayer.isConnected) return;
  if (video.currentTime > 0) {
    localStorage.setItem('pokeSeason', currentSeason);
    localStorage.setItem('pokeEpisode', currentEpisode);
    localStorage.setItem('pokeTime', video.currentTime);
  }
});

playBtn.addEventListener('click',()=>{
  const selectedSeason = parseInt(seasonSelect.value);
  const selectedEpisode = parseInt(episodeSelect.value);
  
  let timeToResume = 0;
  if (selectedSeason === currentSeason && selectedEpisode === currentEpisode && playBtn.dataset.resumeTime) {
    timeToResume = parseFloat(playBtn.dataset.resumeTime);
  }
  
  currentSeason = selectedSeason;
  currentEpisode = selectedEpisode;
  playBtn.dataset.resumeTime = 0;
  
  loadAndPlayCurrent(timeToResume);
});

nextBtn.addEventListener('click',()=>{advanceToNext();});
prevBtn.addEventListener('click',()=>{goToPrev();});

/* LÓXICA DO CHROMECAST CON MANDO ILLADO */
let castPlayer = null;
let castPlayerController = null;
let sincronizadorReloxo = null;

window.__onGCastApiAvailable = function(isAvailable) {
  if (isAvailable) {
    const context = cast.framework.CastContext.getInstance();
    context.setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.PAGE_SCOPED
    });

    castPlayer = new cast.framework.RemotePlayer();
    castPlayerController = new cast.framework.RemotePlayerController(castPlayer);

    castPlayerController.addEventListener(
      cast.framework.RemotePlayerEventType.IS_CONNECTED_CHANGED,
      function() {
        if (castPlayer.isConnected) {
          console.log('Conectado a Chromecast!');
          status.textContent = "Emitindo na TV...";
          
          video.pause();
          video.removeAttribute('controls'); // Eliminamos controis nativos perigosos
          castOverlay.style.display = 'flex';
          
          enviarVideoAChromecastConTempo(video.src, video.currentTime);
          activarSincronizacionTV();
        } else {
          console.log('Desconectado de Chromecast.');
          status.textContent = "Listo";
          castOverlay.style.display = 'none';
          video.setAttribute('controls', 'true'); // Recuperamos controis nativos
          if (sincronizadorReloxo) clearInterval(sincronizadorReloxo);
          video.muted = false;
        }
      }
    );

    // O MANDO PROPRIO DA WEB CONTROLA DIRECTAMENTE A TELEVISIÓN
    castPlayPauseBtn.addEventListener('click', () => {
      if (castPlayer && castPlayer.isConnected) {
        castPlayerController.playOrPause();
      }
    });

    castProgressBar.addEventListener('change', () => {
      if (castPlayer && castPlayer.isConnected && castPlayer.duration > 0) {
        const novoTempo = (castProgressBar.value / 100) * castPlayer.duration;
        castPlayer.currentTime = novoTempo;
        castPlayerController.seek();
      }
    });
  }
};

function activarSincronizacionTV() {
  if (sincronizadorReloxo) clearInterval(sincronizadorReloxo);
  
  sincronizadorReloxo = setInterval(() => {
    if (castPlayer && castPlayer.isConnected && castPlayer.duration > 0) {
      
      // 1. Sincronizar o icono de Play/Pause do mando virtual
      castPlayPauseBtn.textContent = castPlayer.isPaused ? '▶' : '⏸';
      
      // 2. Sincronizar a liña de progreso do mando virtual
      const pct = (castPlayer.currentTime / castPlayer.duration) * 100;
      castProgressBar.value = pct;
      
      // 3. Sincronizar o texto de tempo (01:23 / 22:00)
      const label = document.getElementById('castTimeLabel');
      if (label) {
        label.textContent = formatTimeHelper(castPlayer.currentTime) + " / " + formatTimeHelper(castPlayer.duration);
      }
      
      // 4. Gardar o progreso en segundo plano no disco
      localStorage.setItem('pokeSeason', currentSeason);
      localStorage.setItem('pokeEpisode', currentEpisode);
      localStorage.setItem('pokeTime', castPlayer.currentTime);
      
      // Sincronizamos en silencio o tempo do vídeo oculto por se desconectamos
      video.currentTime = castPlayer.currentTime; 
      
      // 5. DETECTAR FIN DE EPISODIO NA TELEVISIÓN AUTOMATICAMENTE
      if (castPlayer.currentTime >= (castPlayer.duration - 1.5) || castPlayer.playerState === 'IDLE') {
         console.log("Episodio rematado na TV. Saltando...");
         clearInterval(sincronizadorReloxo);
         
         const haiMais = advanceToNext(); 
         if (!haiMais) {
           status.textContent = "Fin da serie";
           castOverlay.style.display = 'none';
           video.setAttribute('controls', 'true');
         }
         return;
      }
    }
  }, 1000);
}

function enviarVideoAChromecastConTempo(url, segundoActual) {
  const context = cast.framework.CastContext.getInstance();
  const session = context.getCurrentSession();
  
  if (session) {
    const mediaInfo = new chrome.cast.media.MediaInfo(url, 'video/mp4');
    const request = new chrome.cast.media.LoadRequest(mediaInfo);
    request.currentTime = segundoActual; 

    session.loadMedia(request).then(
      () => { 
        console.log('Emitindo a TV dende o segundo ' + segundoActual); 
        // Damos un segundo de marxe para reactivar o reloxo na nova ligazón
        setTimeout(() => { activarSincronizacionTV(); }, 1000);
      },
      (err) => { console.error('Erro en Chromecast:', err); }
    );
  }
}

// Se o usuario tenta darlle ao play nativo co teclado ou cas teclas multimedia mentres emite, conxelámolo
video.addEventListener('play', () => {
  if (castPlayer && castPlayer.isConnected) {
    video.pause();
  }
});
</script>
</body>
</html>
